name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Run checks
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi
          go vet ./...
          go test ./...
          go build ./...

      - name: Build release artifacts
        run: VERSION="${GITHUB_REF_NAME#v}" DIST_DIR=dist bash scripts/release-check.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<'NOTES'
          jfc formats common project files with one CLI:

          - Formats JSON, JSONC, JSONL/NDJSON, YAML, TOML, and Markdown.
          - Supports stdout, stdin, in-place writes, check mode, list-different mode, and unified diffs.
          - Reads nearest `jfc.toml` config files and supports explicit `--config` and `--stdin-filepath`.
          - Respects jfc-specific ignores plus `.ignore`, `.gitignore`, and `.git/info/exclude`.
          - Includes `jfc init` for minimal config generation and `jfc --version` for install verification.
          - Release archives include the `jfc` binary and `man/jfc.1` for Darwin, Linux, and Windows on amd64 and arm64.
          NOTES
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
